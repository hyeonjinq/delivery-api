spring:
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  datasource:
    username: root
    password: 1234
    url: "jdbc:mysql://localhost:3306/food_delivery"
    driver-class-name: com.mysql.cj.jdbc.Driver
  devtools:
    livereload:
      enabled: false

payment:
  pg-id: 123456789

server:
  port: 8081
  role-name: delivery-api

jwt:
  key: fastcampus-education-kotlin-project
  access-token-expiration: 3600000
  refresh-token-expiration: 86400000

google:
  map:
    url: "https://maps.googleapis.com/maps/api/geocode/json"